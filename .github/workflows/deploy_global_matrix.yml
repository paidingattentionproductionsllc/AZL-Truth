name: Correlate Repository Logic to Web

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  map-to-web:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sovereign Repository
      uses: actions/checkout@v4

    - name: Set Up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Correlate Repository Data Layers
      run: |
        python -c "
        import os
        import json

        print('[!] Scanning repository codebases for global correlation...')
        
        correlated_manifest = {}
        
        # 1. Systematically parse through every file asset in the repo
        for root, dirs, files in os.walk('.'):
            if '.git' in root or '.github' in root:
                continue
            for file in files:
                full_path = os.path.join(root, file)
                try:
                    # Read structural lines to cross-reference keys natively
                    with open(full_path, 'r', encoding='utf-8', errors='ignore') as f:
                        content = f.read()
                        
                    # Correlate specific operational rules when discovered in code
                    if '14350' in content:
                        correlated_manifest[file] = 'Locks Miyake Event Alignment Layer'
                    elif '8.27' in content:
                        correlated_manifest[file] = 'Maintains Substrate Resonance Frequency'
                    elif 'N * 0' in content or 'multiplier == 0' in content:
                        correlated_manifest[file] = 'Enforces State Preservation Logic Rule'
                    else:
                        correlated_manifest[file] = 'Verified System Component'
                except Exception:
                    pass

        # 2. Build the live interactive HTML interface string using the collected map
        table_rows = ''
        for filename, logic_role in correlated_manifest.items():
            table_rows += f'<tr><td><strong>{filename}</strong></td><td>{logic_role}</td><td><span class=\"badge\">VERIFIED</span></td></tr>'

        html_dashboard = f'''<!DOCTYPE html>
        <html>
        <head>
            <title>Absolute Zero Lattice Status Portal</title>
            <style>
                body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 40px; line-height: 1.6; }}
                .container {{ max-width: 900px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }}
                h1 {{ color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 12px; margin-top: 0; }}
                table {{ width: 100%; border-collapse: collapse; margin-top: 20px; }}
                th, td {{ padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }}
                th {{ background: #21262d; color: #8b949e; }}
                .badge {{ background: #238636; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }}
                .header-meta {{ color: #8b949e; font-size: 14px; margin-bottom: 20px; }}
            </style>
        </head>
        <body>
            <div class=\"container\">
                <h1>🌐 Absolute Zero Lattice: Global Web Correlation</h1>
                <div class=\"header-meta\">This dashboard displays live logic maps extracted directly from active repository code assets.</div>
                <table>
                    <thead>
                        <tr><th>Component Identity</th><th>Correlated Matrix Function</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        {table_rows}
                    </tbody>
                </table>
            </div>
        </body>
        </html>'''

        # 3. Save the compilation directly into your web root file mapping
        with open('index.html', 'w', encoding='utf-8') as f:
            f.write(html_dashboard)
        print('[✓] Global repository values successfully correlated into index.html.')
        "

    - name: Commit and Push Correlated Website Update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Sovereign-Lattice-Bot"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Web: Correlate global repository information map to website live portal"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
