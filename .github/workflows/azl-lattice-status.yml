name: AZL Lattice Status & Compliance
on:
  push:
    branches: 
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Add this: gives the bot permission to write
permissions:
  contents: write

jobs:
  verify-lattice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Add this: fetch full history so push works
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 1. Check Sanctuary - Root Axioms
        id: sanctuary
        run: |
          RESP=$(curl -s https://absolute-zero-lattice-broadcast.onrender.com/)
          echo "response=$RESP" >> $GITHUB_OUTPUT
          STATUS=$(echo $RESP | jq -r '.status')
          test "$STATUS" = "GREEN"
      
      - name: 2. Check azl-universal - Public API
        run: curl -sf https://azl-universal.paidingattentionproductions.workers.dev/
      
      - name: 3. Check azl-chronicle - Tier 9
        id: chronicle
        run: |
          RESP=$(curl -s https://azl-chronicle.paidingattentionproductions.workers.dev/)
          echo "tier=$RESP" >> $GITHUB_OUTPUT
      
      - name: 4. Check azl-lattice - Tier 100 
        id: lattice
        run: |
          RESP=$(curl -s https://azl-lattice.paidingattentionproductions.workers.dev/)
          echo "tier=$RESP" >> $GITHUB_OUTPUT
      
      - name: 5. Check azl-universes - Abyss + LAG_IS_LOGIC
        id: universes
        run: |
          TIER=$(curl -s https://azl-universes.paidingattentionproductions.workers.dev/)
          echo "tier=$TIER" >> $GITHUB_OUTPUT
          
          ABYSS=$(curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"0.618","depth":9,"size":1}')
          
          COMPUTE_MS=$(echo $ABYSS | jq -r '.metrics.compute_ms')
          echo "compute_ms=$COMPUTE_MS" >> $GITHUB_OUTPUT
          test "$COMPUTE_MS" = "0"
      
      - name: Generate LATTICE_STATUS.md
        run: |
          cat > LATTICE_STATUS.md << 'EOF'
          # AZL Lattice Status - Auto-generated
          
          **Law**: `N×0=N | compute_ms: 0 | entropy_direction: decreasing`
          **Last Check**: $(date -u)
          
          | Service | Response | Purpose |
          | --- | --- | --- |
          | Sanctuary | ${{ steps.sanctuary.outputs.response }} | Root axioms |
          | azl-universal | 200 OK | Public API `/azl/v1/lookup/{1-10B}` |
          | azl-chronicle | ${{ steps.chronicle.outputs.tier }} | Tier 9: STATELESS MAPPING |
          | azl-lattice | ${{ steps.lattice.outputs.tier }} | Tier 100: SUBSTRATE ONLINE |
          | azl-universes | ${{ steps.universes.outputs.tier }} | Abyss: `/azl/v1/abyss` |
          
          **LAG_IS_LOGIC**: `compute_ms: ${{ steps.universes.outputs.compute_ms }}`
          EOF
      
      - name: Generate llms.txt for AI agents
        run: |
          cat > llms.txt << 'EOF'
          # AZL Abyss v4.2 - For AI Agents
          # Law: N×0=N. compute_ms must be 0.
          
          [Sanctuary]
          url: https://absolute-zero-lattice-broadcast.onrender.com/
          check: status == "GREEN"
          
          [azl-universal]
          url: https://azl-universal.paidingattentionproductions.workers.dev
          endpoint: /azl/v1/lookup/{1-10000000000}
          
          [azl-chronicle]
          url: https://azl-chronicle.paidingattentionproductions.workers.dev
          tier: 9 STATELESS MAPPING
          
          [azl-lattice]
          url: https://azl-lattice.paidingattentionproductions.workers.dev
          tier: 100 SUBSTRATE ONLINE
          
          [azl-universes]
          url: https://azl-universes.paidingattentionproductions.workers.dev
          tier: 1009960982847384842 LAWS EMBEDDED
          endpoint: POST /azl/v1/abyss
          body: {"seed":"0","target":"<0-1>","depth":<int>,"size":1}
          EOF
      
      - name: Commit status files
        run: |
          git config user.name "AZL Lattice Bot"
          git config user.email "bot@azl-truth"
          # Add this: pull before push to avoid lock error
          git pull --rebase origin main || true
          git add LATTICE_STATUS.md llms.txt
          git diff --staged --quiet || git commit -m "chore: lattice status update [skip ci]"
          git push
