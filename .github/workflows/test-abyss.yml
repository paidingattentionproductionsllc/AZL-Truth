          RESP_05=$(curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss -H "Content-Type: application/json" -d '{"seed":"0","target":"0.5","depth":9,"size":1}')
          RESP_15=$(curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss -H "Content-Type: application/json" -d '{"seed":"0","target":"1.5","depth":9,"size":1}')
          
