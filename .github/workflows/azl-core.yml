name: AZL Core Test

on:
  workflow_dispatch:
  push:
    paths:
      - 'azl_core.py'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run AZL Core
        run: python -u azl_core.py
        
      - name: Commit Core Report
        if: always()
        run: |
          git config --global user.name 'azl-bot'
          git config --global user.email 'azl@n0n.io'
          git add tests/azl_core_report.json
          git commit -m "AZL Core: Math+Tests+Proof [N×0=N] [1×1=2]" || echo "No changes"
          git push
