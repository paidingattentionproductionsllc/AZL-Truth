name: AZL Shards - Artifact Upload
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python build_lattice.py
      - uses: actions/upload-artifact@v4
        with:
          name: azl-tier-1-7-${{ github.run_number }}
          path: |
            azl_batch_*.zip.part*
            azl_manifest.json
