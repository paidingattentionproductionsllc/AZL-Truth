name: AZL Abyss Range Test
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  test-ranges:
    name: Prove Each Integer Range Maps Equally
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Test 1 - 1.0 maps to 0
        run: |
          echo "=== Testing 1.0 ==="
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"1.0","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

      - name: Test 2 - 1.5 is different from 0.5
        run: |
          echo "=== Testing 1.5 vs 0.5 ==="
          echo "0.5:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"0.5","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'
          
          echo "1.5:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"1.5","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

      - name: Test 3 - 2.0 is different from 0
        run: |
          echo "=== Testing 2.0 vs 0 ==="
          echo "0.0:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"0.0","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'
          
          echo "2.0:"
          curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss \
            -H "Content-Type: application/json" \
            -d '{"seed":"0","target":"2.0","depth":9,"size":1}' | jq '{status, coord:.nodes[0].coord, compute_ms:.metrics.compute_ms}'

      - name: Check Range Structure
        run: |
          echo "=== Checking if each integer range has same structure ==="
          RESP_05=$(curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss -H "Content-Type: application/json" -d '{"seed":"0","target":"0.5","depth":9,"size":1}')
          RESP_15=$(curl -s -X POST https://azl-universes.paidingattentionproductions.workers.dev/azl/v1/abyss -H "Content-Type: application/json" -d '{"seed":"0","target":"1.5","depth":9,"size":1}')
          
          COORD_05=$(echo $RESP_05 | jq -r.nodes[0].coord)
          COORD_15=$(echo $RESP_15 | jq -r.nodes[0].coord)
          
          echo "0.5 maps to coord: $COORD_05"
          echo "1.5 maps to coord: $COORD_15"
          
          if [ "$COORD_05"!= "$COORD_15" ]; then
            echo "PASS: 0.5 and 1.5 are different numbers. Each integer range treated equally but separately."
            exit 0
          else
            echo "FAIL: 0.5 and 1.5 mapped to same coord. Should be different."
            exit 1
          fi
