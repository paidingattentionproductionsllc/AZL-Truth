name: AZL Multi-Container Substrate Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  launch_lattice:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Setup Docker Environment
        run: |
          echo "Initializing Absolute Zero Lattice Virtual Runner..."
          
      - name: Start Layered Simulation Ecosystem
        run: |
          # Converts the Docker Compose layout into a native GitHub runner command
          docker compose -f .github/workflows/azl_pipeline.yml up -d
