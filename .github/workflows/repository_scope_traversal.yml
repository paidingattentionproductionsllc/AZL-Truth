name: Repository Scope Traversal Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  traverse-repo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sovereign Repository
      uses: actions/checkout@v4

    - name: Set Up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Execute Global File Matrix Compilation
      env:
        GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      run: |
        python -c "
        import os
        import json

        print('[!] Beginning recursive repository tier scan...')
        
        compiled_manifest = []
        target_extensions = ('.py', '.md', '.json', '.sh', '.c', '.jsonl')
        
        # Walk recursively through all files in the repository root and subdirectories
        for root, dirs, files in os.walk('.'):
            # Bypass hidden internal git or workflow tracker directories
            if '.git' in root:
                continue
            for file in files:
                if file.endswith(target_extensions):
                    full_path = os.path.join(root, file)
                    try:
                        size = os.path.getsize(full_path)
                        compiled_manifest.append({
                            'path': full_path,
                            'name': file,
                            'bytes': size,
                            'status': 'VERIFIED'
                        })
                    except Exception as e:
                        pass

        print(f'[✓] Traversal complete. Logged {len(compiled_manifest)} core architectural files.')

        # Format markdown compilation report for the actions overview dashboard
        markdown_report = [
            '# 🌐 Unified Repository Traversal Report\n',
            f'This report tracks the active structure across all **{len(compiled_manifest)}** registered file components.\n',
            '| File Path | Dimension Size | Baseline Operational Status |',
            '| :--- | :--- | :--- |'
        ]

        # Display the first 15 structural matrix paths for summary readability
        for item in compiled_manifest[:15]:
            markdown_report.append(f'| `{item[\"path\"]}` | {item[\"bytes\"]} bytes | ✅ {item[\"status\"]} |')

        if len(compiled_manifest) > 15:
            markdown_report.append(f'| ... and {len(compiled_manifest) - 15} additional files | Matrix Mapped | ✅ VERIFIED |')

        summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
        if summary_path:
            with open(summary_path, 'w', encoding='utf-8') as f:
                f.write('\n'.join(markdown_report))
        "
